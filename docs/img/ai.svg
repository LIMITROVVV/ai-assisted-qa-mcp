<svg xmlns="http://www.w3.org/2000/svg" width="1160" height="440" viewBox="0 0 1160 440" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <rect width="1160" height="440" fill="#FAFBFC"/>
  <text x="40" y="48" font-size="26" font-weight="700" fill="#1B1F24">ai-assisted-qa-mcp - the loop</text>
  <text x="40" y="76" font-size="15" fill="#57606A">AI writes the first draft, the engineer reviews and owns the result. the gap between those two is where the real QA work lives.</text>
  <rect x="40" y="128" width="200" height="80" rx="10" fill="#FFFFFF" stroke="#D0D7DE" stroke-width="1.5"/>
  <text x="140" y="162" text-anchor="middle" font-size="15" font-weight="600" fill="#1B1F24">spec / ticket</text>
  <text x="140" y="184" text-anchor="middle" font-size="12.5" fill="#57606A">feature, OpenAPI, PR diff</text>
  <rect x="300" y="128" width="230" height="80" rx="10" fill="#F3EEFB" stroke="#C4ACE9" stroke-width="1.5"/>
  <text x="415" y="156" text-anchor="middle" font-size="15" font-weight="700" fill="#6F42C1">Claude + MCP</text>
  <text x="415" y="178" text-anchor="middle" font-size="12.5" fill="#50337f">Postman / Allure / fs / github</text>
  <text x="415" y="196" text-anchor="middle" font-size="12.5" fill="#50337f">drafts cases, scaffolds tests</text>
  <rect x="590" y="128" width="230" height="80" rx="10" fill="#FBF1E6" stroke="#E5C089" stroke-width="1.5"/>
  <text x="705" y="156" text-anchor="middle" font-size="15" font-weight="700" fill="#9A6700">engineer review</text>
  <text x="705" y="178" text-anchor="middle" font-size="12.5" fill="#7d5a14">fix wrong assertions, add</text>
  <text x="705" y="196" text-anchor="middle" font-size="12.5" fill="#7d5a14">domain + edge cases</text>
  <rect x="880" y="128" width="240" height="80" rx="10" fill="#EAF3EC" stroke="#AECDB4" stroke-width="1.5"/>
  <text x="1000" y="162" text-anchor="middle" font-size="15" font-weight="700" fill="#1A7F37">test suite</text>
  <text x="1000" y="184" text-anchor="middle" font-size="12.5" fill="#36603F">reviewed, trusted, owned</text>
  <g stroke="#8C959F" stroke-width="2" fill="none" marker-end="url(#ah4)">
    <line x1="240" y1="168" x2="296" y2="168"/>
    <line x1="530" y1="168" x2="586" y2="168"/>
    <line x1="820" y1="168" x2="876" y2="168"/>
  </g>
  <rect x="40" y="262" width="540" height="150" rx="10" fill="#FFFFFF" stroke="#AECDB4" stroke-width="1.5"/>
  <text x="64" y="290" font-size="15" font-weight="700" fill="#1A7F37">AI is good at</text>
  <text x="64" y="316" font-size="13" fill="#36603F">- first draft of cases when the spec is clear</text>
  <text x="64" y="338" font-size="13" fill="#36603F">- formatting and test documentation (Allure)</text>
  <text x="64" y="360" font-size="13" fill="#36603F">- scaffolding test code structure</text>
  <text x="64" y="382" font-size="13" fill="#36603F">- understanding an unfamiliar API quickly</text>
  <rect x="600" y="262" width="520" height="150" rx="10" fill="#FFFFFF" stroke="#E5A5A0" stroke-width="1.5"/>
  <text x="624" y="290" font-size="15" font-weight="700" fill="#CF222E">don't trust it for</text>
  <text x="624" y="316" font-size="13" fill="#8a2520">- inventing API fields that aren't there</text>
  <text x="624" y="338" font-size="13" fill="#8a2520">- domain rules that live in someone's head</text>
  <text x="624" y="360" font-size="13" fill="#8a2520">- race conditions and timing bugs</text>
  <text x="624" y="382" font-size="13" fill="#8a2520">- deciding what's actually worth testing</text>
  <defs>
    <marker id="ah4" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M1 1 L9 5 L1 9" fill="none" stroke="#8C959F" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
</svg>
